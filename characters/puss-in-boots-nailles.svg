<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 159 280" width="159" height="280">
  <style>
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes sway {
      0%,100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    .wrap { animation: float 3.2s ease-in-out infinite; transform-origin: 80px 280px; }
    .wrap image { animation: sway 3.2s ease-in-out infinite; transform-origin: 80px 280px; }
  </style>
  <g class="wrap">
    <image href="puss-in-boots-nailles.png" width="159" height="280" x="0" y="0"/>
  </g>
</svg>
