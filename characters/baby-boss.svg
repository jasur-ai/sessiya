<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Baby Boss</title>
<desc>Baby Boss — kostyumda, ko'zoynak taqib, qo'llari qovushtirib turgan multfilm personaji</desc>

<style>
  @keyframes sway {
    0%,100%{ transform: rotate(-2deg) translateY(0px); }
    50%{ transform: rotate(2deg) translateY(-4px); }
  }
  @keyframes armL {
    0%,100%{ transform: rotate(0deg); }
    50%{ transform: rotate(4deg); }
  }
  @keyframes armR {
    0%,100%{ transform: rotate(0deg); }
    50%{ transform: rotate(-4deg); }
  }
  @keyframes legL {
    0%,100%{ transform: translateY(0px); }
    50%{ transform: translateY(3px); }
  }
  @keyframes legR {
    0%,100%{ transform: translateY(3px); }
    50%{ transform: translateY(0px); }
  }
  .char-root {
    transform-origin: 340px 300px;
    animation: sway 3s ease-in-out infinite;
  }
  .arm-l {
    transform-origin: 295px 295px;
    animation: armL 3s ease-in-out infinite;
  }
  .arm-r {
    transform-origin: 385px 295px;
    animation: armR 3s ease-in-out infinite;
  }
  .leg-l {
    transform-origin: 320px 430px;
    animation: legL 2.8s ease-in-out infinite;
  }
  .leg-r {
    transform-origin: 360px 430px;
    animation: legR 2.8s ease-in-out infinite;
  }
</style>

<g class="char-root">

  <!-- OYOQLAR -->
  <g class="leg-l">
    <rect x="308" y="428" width="28" height="38" rx="6" fill="#1a1a2e"/>
    <ellipse cx="318" cy="468" rx="18" ry="10" fill="#0d0d1a"/>
    <ellipse cx="326" cy="466" rx="8" ry="6" fill="#1a1a2e"/>
  </g>
  <g class="leg-r">
    <rect x="344" y="428" width="28" height="38" rx="6" fill="#1a1a2e"/>
    <ellipse cx="362" cy="468" rx="18" ry="10" fill="#0d0d1a"/>
    <ellipse cx="354" cy="466" rx="8" ry="6" fill="#1a1a2e"/>
  </g>

  <!-- TANA (KOSTYUM) -->
  <rect x="294" y="300" width="92" height="132" rx="16" fill="#1a1a2e"/>
  <rect x="294" y="300" width="4" height="132" rx="2" fill="#141428"/>
  <rect x="382" y="300" width="4" height="132" rx="2" fill="#141428"/>
  <polygon points="325,300 355,300 348,330 332,330" fill="#ffffff"/>
  <polygon points="337,305 343,305 345,342 340,348 335,342" fill="#0a0a0a"/>
  <ellipse cx="340" cy="312" rx="3" ry="3" fill="#e8e8e8"/>
  <ellipse cx="340" cy="345" rx="2.5" ry="2.5" fill="#2a2a3e"/>
  <ellipse cx="340" cy="358" rx="2.5" ry="2.5" fill="#2a2a3e"/>

  <!-- QO'LLAR -->
  <g class="arm-l">
    <path d="M294 310 Q268 320 260 355 Q256 370 266 378 Q276 386 282 375 Q290 360 298 340 Z" fill="#1a1a2e"/>
    <path d="M263 360 Q255 375 260 388 Q265 400 276 398 Q285 396 286 382 Q284 368 278 356 Z" fill="#e8c9a0"/>
    <ellipse cx="262" cy="392" rx="8" ry="6" fill="#e8c9a0"/>
    <ellipse cx="255" cy="388" rx="6" ry="5" fill="#dbb88a"/>
    <ellipse cx="270" cy="395" rx="6" ry="5" fill="#dbb88a"/>
  </g>
  <g class="arm-r">
    <path d="M386 310 Q412 320 420 355 Q424 370 414 378 Q404 386 398 375 Q390 360 382 340 Z" fill="#1a1a2e"/>
