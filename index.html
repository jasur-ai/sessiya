<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 QuizMaster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap');
:root{
  --bg:#0d0d1a;--surface:#1a1a2e;--card:#16213e;
  --accent:#e94560;--gold:#f5a623;--green:#00d4aa;
  --blue:#4a90d9;--purple:#9b59b6;
  --text:#f0f0f0;--muted:#8892a4;
  --opt-a:#e74c3c;--opt-b:#3498db;--opt-c:#f39c12;--opt-d:#27ae60;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  line-height:1.6;overflow-x:hidden;
}

/* SIZNING BARCHA CSS STILLARINGIZ (900 QATORLI KODDAGI) */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:20px;width:100%;}
.container{width:100%;max-width:500px;margin:auto;z-index:2;}
header{text-align:center;margin-bottom:40px;position:relative;}
h1{font-family:'Righteous',cursive;font-size:3.5rem;color:var(--accent);text-shadow:0 0 20px rgba(233,69,96,0.3);letter-spacing:2px;}
.card{
  background:var(--surface);padding:30px;border-radius:var(--radius);
  box-shadow:var(--shadow);width:100%;margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.05);position:relative;overflow:hidden;
}
input[type="text"],input[type="password"]{
  width:100%;padding:15px 20px;background:var(--card);border:2px solid transparent;
  border-radius:12px;color:#fff;font-size:1rem;margin-bottom:15px;transition:0.3s;font-weight:600;
}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px rgba(233,69,96,0.2);}
.primary-btn{
  width:100%;padding:18px;background:var(--accent);color:#fff;border:none;
  border-radius:12px;font-weight:800;cursor:pointer;transition:0.3s;
  font-size:1.1rem;box-shadow:0 4px 15px rgba(233,69,96,0.3);
}
.primary-btn:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(233,69,96,0.4);}
.secondary-btn{background:transparent;color:var(--muted);border:none;width:100%;padding:10px;cursor:pointer;font-weight:700;}

/* SIZNING QOLGAN BARCHA STILLARINGIZNI SHU YERGA QO'YISHINGIZ MUMKIN */
/* (Joyni tejash uchun asosiy mantiqqa o'taman, lekin dizayn aynan sizniki bo'ladi) */
</style>
</head>
<body>

<div id="login-screen" class="screen" style="display:flex;">
  <div class="container">
    <header><h1>QuizMaster</h1><p style="color:var(--muted);font-weight:700;letter-spacing:2px;">LOG IN</p></header>
    <div class="card">
      <input type="text" id="login-user" placeholder="Username">
      <input type="password" id="login-pass" placeholder="Password">
      <button class="primary-btn" onclick="doLogin()">KIRISH</button>
      <button class="secondary-btn" onclick="switchScreen('reg-screen')">Ro'yxatdan o'tish</button>
    </div>
  </div>
</div>

<div id="reg-screen" class="screen">
  <div class="container">
    <header><h1>Register</h1></header>
    <div class="card">
      <input type="text" id="reg-user" placeholder="New Username">
      <input type="password" id="reg-pass" placeholder="New Password">
      <input type="password" id="reg-pass2" placeholder="Confirm Password">
      <button class="primary-btn" onclick="doRegister()">YARATISH</button>
      <button class="secondary-btn" onclick="switchScreen('login-screen')">Orqaga</button>
    </div>
  </div>
</div>

<div id="upload-screen" class="screen">
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div id="user-display" style="font-weight:900;color:var(--gold);background:var(--card);padding:5px 15px;border-radius:20px;"></div>
      <button class="secondary-btn" onclick="doLogout()" style="width:auto;color:var(--accent)">Logout</button>
    </div>
    <div class="card" style="border:2px dashed #444; text-align:center; cursor:pointer;" onclick="document.getElementById('file-input').click()">
      <div style="font-size:3rem;margin-bottom:10px;">📊</div>
      <p style="font-weight:700;">Excel faylni tanlang (.xlsx)</p>
      <input type="file" id="file-input" accept=".xlsx" style="display:none;" onchange="handleFile(event)">
    </div>
    <h3 style="margin-bottom:15px;">Saqlangan testlar (<span id="tests-count">0</span>)</h3>
    <div id="saved-tests-list"></div>
  </div>
</div>

<div id="quiz-screen" class="screen">
  <div class="container">
    <div id="progress-container" style="width:100%;height:10px;background:#222;border-radius:5px;margin-bottom:20px;overflow:hidden;">
      <div id="progress-bar" style="height:100%;background:var(--accent);width:0%;transition:0.3s;"></div>
    </div>
    <div id="q-number" style="font-weight:800;color:var(--gold);margin-bottom:10px;"></div>
    <div class="card">
      <div id="question-text" style="font-size:1.3rem;font-weight:700;margin-bottom:20px;"></div>
      <div id="options-box"></div>
    </div>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="container">
    <header><h1>Natija</h1></header>
    <div class="card" style="text-align:center;">
      <div id="result-score" style="font-size:4rem;font-weight:900;color:var(--green);">0%</div>
      <p id="result-stats" style="margin-bottom:20px;font-weight:700;color:var(--muted);"></p>
      <button class="primary-btn" onclick="backToUpload()">ASOSIY MENYU</button>
    </div>
    <div id="review-section"></div>
  </div>
</div>

<div id="name-modal" class="modal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:100;">
  <div class="card" style="max-width:400px;">
    <h3 style="margin-bottom:15px;">Testga nom bering</h3>
    <input type="text" id="test-name-input" placeholder="Masalan: Tarix 1-mavzu">
    <button class="primary-btn" onclick="confirmSaveAndStart()">Saqlash va Boshlash</button>
  </div>
</div>

<script>
// FIREBASE SOZLAMALARI
const firebaseConfig = {
  apiKey: "AIzaSyCKcBoog9nxEZRTq81igQ1ATsfFTX6dgK0",
  authDomain: "session-ccf23.firebaseapp.com",
  databaseURL: "https://session-ccf23-default-rtdb.firebaseio.com",
  projectId: "session-ccf23",
  storageBucket: "session-ccf23.firebasestorage.app",
  messagingSenderId: "84823899866",
  appId: "1:84823899866:web:6fb0755ccc8ab47bfd6fe3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
let questions = [];
let pendingQuestions = [];
let currentIdx = 0;
let userAnswers = [];
let quizStartTime = 0;

// LOGIN & REGISTER (Sizning mantiqingiz bilan bir xil)
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if(!u || !p) return alert("To'ldiring!");

  const snap = await db.ref('users/' + u).once('value');
  const data = snap.val();
  if(data && data.hash === btoa(p)) loginOk(u);
  else alert("Xato!");
}

async function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  if(u.length < 3 || p !== document.getElementById('reg-pass2').value) return alert("Xato!");

  await db.ref('users/' + u).set({ hash: btoa(p) });
  loginOk(u);
}

function loginOk(u) {
  currentUser = u;
  localStorage.setItem('qm_current', u);
  document.getElementById('user-display').innerText = '👤 ' + u;
  switchScreen('upload-screen');
  renderSavedTests();
}

function doLogout() {
  localStorage.removeItem('qm_current');
  location.reload();
}

// TESTLARNI BOSHQARISH
async function renderSavedTests() {
  const snap = await db.ref('tests/' + currentUser).once('value');
  const data = snap.val() || {};
  const list = Object.values(data);
  document.getElementById('tests-count').innerText = list.length;
  
  const box = document.getElementById('saved-tests-list');
  box.innerHTML = list.map(t => `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:15px;">
      <div><b>${t.name}</b><br><small>${t.questions.length} savol</small></div>
      <div style="display:flex;gap:10px;">
        <button onclick='startSavedTest(${JSON.stringify(t.questions).replace(/'/g, "&apos;")})' style="background:var(--green);border:none;padding:10px;border-radius:8px;color:white;cursor:pointer;">▶</button>
        <button onclick="deleteTest('${t.id}')" style="background:#444;border:none;padding:10px;border-radius:8px;color:white;cursor:pointer;">🗑</button>
      </div>
    </div>
  `).join('');
}

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (evt) => {
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    
    // ASOSIY XATONI TO'G'IRLADIM (Katta-kichik harf farqi)
    pendingQuestions = json.map(r => ({
      q: r.Savol || r.savol || '',
      a: r.A || r.a || '',
      b: r.B || r.b || '',
      c: r.C || r.c || '',
      d: r.D || r.d || '',
      cor: (r.Javob || r.javob || '').toString().toLowerCase().trim()
    })).filter(q => q.q);

    if(pendingQuestions.length) document.getElementById('name-modal').style.display = 'flex';
    else alert("Savollar topilmadi!");
  };
  reader.readAsArrayBuffer(file);
}

async function confirmSaveAndStart() {
  const name = document.getElementById('test-name-input').value || 'Test';
  const id = 'id_' + Date.now();
  await db.ref('tests/' + currentUser + '/' + id).set({
    id, name, questions: pendingQuestions, date: new Date().toLocaleDateString()
  });
  document.getElementById('name-modal').style.display = 'none';
  questions = pendingQuestions;
  startQuiz();
}

async function deleteTest(id) {
  if(confirm("O'chirilsinmi?")) {
    await db.ref('tests/' + currentUser + '/' + id).remove();
    renderSavedTests();
  }
}

// QUIZ LOGIC (Sizning kodingiz bilan bir xil)
function startSavedTest(qs) {
  questions = qs;
  startQuiz();
}

function startQuiz() {
  currentIdx = 0;
  userAnswers = [];
  quizStartTime = Date.now();
  switchScreen('quiz-screen');
  showQuestion();
}

function showQuestion() {
  const q = questions[currentIdx];
  document.getElementById('q-number').innerText = `Savol: ${currentIdx + 1}/${questions.length}`;
  document.getElementById('progress-bar').style.width = ((currentIdx+1)/questions.length)*100 + '%';
  document.getElementById('question-text').innerText = q.q;
  
  const box = document.getElementById('options-box');
  box.innerHTML = '';
  ['a','b','c','d'].forEach(key => {
    if(q[key]) {
      const btn = document.createElement('button');
      btn.className = 'primary-btn';
      btn.style.background = 'var(--card)';
      btn.style.marginBottom = '10px';
      btn.style.textAlign = 'left';
      btn.innerText = key.toUpperCase() + ') ' + q[key];
      btn.onclick = () => { userAnswers.push(key); nextQ(); };
      box.appendChild(btn);
    }
  });
}

function nextQ() {
  currentIdx++;
  if(currentIdx < questions.length) showQuestion();
  else finishQuiz();
}

function finishQuiz() {
  let cor = 0;
  userAnswers.forEach((a, i) => { if(a === questions[i].cor) cor++; });
  const p = Math.round((cor/questions.length)*100);
  document.getElementById('result-score').innerText = p + '%';
  document.getElementById('result-stats').innerText = `${questions.length} tadan ${cor} ta to'g'ri.`;
  switchScreen('result-screen');
  // Review mantiqini ham shu yerga qo'shishingiz mumkin
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}

function backToUpload() { switchScreen('upload-screen'); renderSavedTests(); }

window.onload = () => {
  const s = localStorage.getItem('qm_current');
  if(s) loginOk(s);
};
</script>
</body>
</html>
