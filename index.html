<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 QuizMaster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap');
:root{
  --bg:#0d0d1a;--surface:#1a1a2e;--card:#16213e;
  --accent:#e94560;--gold:#f5a623;--green:#00d4aa;
  --blue:#4a90d9;--purple:#9b59b6;
  --text:#f0f0f0;--muted:#8892a4;
  --opt-a:#e74c3c;--opt-b:#3498db;--opt-c:#f39c12;--opt-d:#27ae60;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(233,69,96,.08) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(74,144,217,.08) 0%,transparent 60%),
    radial-gradient(ellipse at 50% 90%,rgba(155,89,182,.08) 0%,transparent 60%);
}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;width:100%;max-width:440px;}
.auth-logo{font-family:'Righteous',cursive;font-size:3rem;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--gold),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.auth-sub{color:var(--muted);font-size:.9rem;font-weight:600;margin-bottom:32px;text-align:center;}
.auth-card{width:100%;background:var(--card);border-radius:24px;padding:32px;border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow);}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:26px;}
.auth-tab{padding:10px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.05);color:var(--muted);}
.auth-tab.active{background:var(--accent);color:#fff;}
.auth-label{font-size:.78rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.auth-input{width:100%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 15px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;outline:none;transition:border-color .2s;margin-bottom:14px;}
.auth-input:focus{border-color:var(--accent);}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--accent),#c0392b);border:none;border-radius:12px;padding:14px;color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;transition:all .2s;margin-top:4px;}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(233,69,96,.4);}
.auth-err{background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.3);border-radius:10px;padding:10px 14px;color:var(--accent);font-size:.86rem;font-weight:700;margin-bottom:12px;display:none;}
.auth-err.show{display:block;}

/* TOPBAR */
.topbar{width:100%;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.07);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.topbar-user{display:flex;align-items:center;gap:10px;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;color:#fff;flex-shrink:0;}
.user-name{font-weight:800;font-size:.92rem;color:var(--text);}
.logout-btn{background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.25);border-radius:10px;padding:7px 13px;color:var(--accent);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .2s;}

/* UPLOAD */
#upload-screen{display:none;flex-direction:column;align-items:center;padding:28px 20px 60px;width:100%;max-width:600px;}
.upload-zone{width:100%;border:3px dashed rgba(233,69,96,.4);border-radius:24px;padding:46px 40px;cursor:pointer;transition:all .3s;background:rgba(233,69,96,.05);position:relative;overflow:hidden;text-align:center;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);transform:scale(1.02);}
.upload-icon{font-size:3.2rem;margin-bottom:12px;}
.upload-text{font-size:1.15rem;font-weight:800;margin-bottom:5px;}
.upload-sub{color:var(--muted);font-size:.85rem;}
#file-input{display:none;}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px;width:100%;}
.feature-card{background:var(--surface);border-radius:12px;padding:13px 10px;text-align:center;font-size:.8rem;font-weight:700;color:var(--muted);border:1px solid rgba(255,255,255,.06);}

/* SAVED TESTS */
.saved-tests-section{width:100%;margin-top:28px;}
.saved-tests-title{font-family:'Righteous',cursive;font-size:1.15rem;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.count-badge{background:var(--accent);color:#fff;font-size:.7rem;padding:2px 9px;border-radius:50px;font-weight:800;}
.saved-test-card{background:var(--surface);border-radius:var(--radius);padding:13px 15px;margin-bottom:9px;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.st-name{font-weight:800;font-size:.92rem;color:var(--text);}
.st-meta{font-size:.74rem;font-weight:600;color:var(--muted);}
.st-actions{display:flex;gap:7px;}
.st-start-btn{background:linear-gradient(135deg,var(--green),#00a080);border:none;border-radius:10px;padding:7px 13px;color:#fff;font-size:.8rem;font-weight:800;cursor:pointer;}
.st-del-btn{background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.25);border-radius:10px;padding:7px 10px;color:var(--accent);cursor:pointer;}

/* MODAL & QUIZ & RESULT */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:999;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border-radius:24px;padding:30px;width:100%;max-width:420px;border:1px solid rgba(255,255,255,.1);}
.stats-bar{width:100%;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.07);padding:10px 20px;display:flex;justify-content:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.stat-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border-radius:50px;padding:5px 12px;font-size:.78rem;font-weight:800;border:1px solid rgba(255,255,255,.08);}
.progress-wrap{width:100%;max-width:700px;padding:18px 20px 0;}
.progress-bar-bg{height:7px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .5s cubic-bezier(.4,0,.2,1);}
.question-card{background:var(--card);border-radius:var(--radius);padding:22px;margin-bottom:16px;border:1px solid rgba(255,255,255,.07);box-shadow:var(--shadow);}
.option-btn{background:var(--card);border:2px solid transparent;border-radius:var(--radius);padding:14px 15px;cursor:pointer;display:flex;align-items:center;gap:11px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;color:var(--text);text-align:left;transition:all .2s;position:relative;overflow:hidden;}
.option-btn.correct-ans{background:rgba(0,212,170,.15)!important;border-color:var(--green)!important;}
.option-btn.wrong-ans{background:rgba(233,69,96,.15)!important;border-color:var(--accent)!important;}
.next-btn{width:100%;background:linear-gradient(135deg,var(--accent),#c0392b);border:none;border-radius:var(--radius);padding:14px;color:#fff;font-weight:900;cursor:pointer;margin-top:13px;display:none;}

#result-screen{display:none;flex-direction:column;align-items:center;width:100%;padding:32px 20px 60px;max-width:700px;}
.result-score-big{font-family:'Righteous',cursive;font-size:3.8rem;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:12px 0;}
.result-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;width:100%;}
.result-card{background:var(--surface);border-radius:var(--radius);padding:16px;text-align:center;border:1px solid rgba(255,255,255,.07);}

@media(max-width:500px){.options-grid{grid-template-columns:1fr;}.features{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-logo">📚 QuizMaster</div>
  <div class="auth-sub">Interaktiv test tizimi</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="btn-login-tab" onclick="switchTab('login')">🔑 Kirish</button>
      <button class="auth-tab" id="btn-reg-tab" onclick="switchTab('register')">📝 Ro'yxat</button>
    </div>
    <div id="auth-err" class="auth-err"></div>
    <div id="tab-login">
      <input class="auth-input" id="login-user" type="text" placeholder="Username">
      <input class="auth-input" id="login-pass" type="password" placeholder="Parol">
      <button class="auth-btn" onclick="doLogin()">🚀 Kirish</button>
    </div>
    <div id="tab-register" style="display:none">
      <input class="auth-input" id="reg-user" type="text" placeholder="Yangi username">
      <input class="auth-input" id="reg-pass" type="password" placeholder="Parol">
      <input class="auth-input" id="reg-pass2" type="password" placeholder="Takrorlang">
      <button class="auth-btn" onclick="doRegister()">✅ Ro'yxatdan o'tish</button>
    </div>
  </div>
</div>

<div class="topbar" id="topbar" style="display:none">
  <div class="topbar-user"><div class="user-avatar" id="user-avatar">?</div><div class="user-name" id="user-name-display">—</div></div>
  <button class="logout-btn" onclick="doLogout()">🚪 Chiqish</button>
</div>

<div id="upload-screen">
  <div class="upload-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(this)">
    <div class="upload-icon">📊</div><div class="upload-text">Excel faylni yuklang</div>
  </div>
  <div class="saved-tests-section">
    <div class="saved-tests-title">📋 Mening testlarim <span class="count-badge" id="tests-count">0</span></div>
    <div id="saved-tests-list"><div class="no-tests-msg">Testlar yo'q</div></div>
  </div>
</div>

<div class="modal-overlay" id="name-modal">
  <div class="modal-box">
    <div class="modal-title">Test nomi</div>
    <input class="auth-input" id="test-name-input" type="text" placeholder="Masalan: Tarix 1-mavzu">
    <button class="auth-btn" onclick="confirmSaveAndStart()">Saqlash</button>
    <button style="background:none; border:none; color:var(--muted); cursor:pointer; width:100%;" onclick="cancelModal()">Bekor qilish</button>
  </div>
</div>

<div id="quiz-screen">
  <div class="stats-bar"><div class="stats-inner" id="stats-inner"></div></div>
  <div class="progress-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div></div>
  <div class="question-wrap" style="padding:20px; max-width:700px; width:100%; margin:auto;">
    <div class="q-number" id="q-number">SAVOL 1</div>
    <div class="question-card"><div class="question-text" id="question-text"></div></div>
    <div class="options-grid" id="options-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Keyingi savol →</button>
  </div>
</div>

<div id="result-screen">
  <div class="result-score-big" id="result-score-big">0%</div>
  <div class="result-cards" id="result-cards-box"></div>
  <div id="review-section" style="width:100%; margin-top:20px;"></div>
  <button class="auth-btn" onclick="backToUpload()" style="margin-top:20px;">🏠 Bosh sahifa</button>
</div>
<script>
// ═══════════════════════════════════════════════════════
// 1. FIREBASE KONFIGURATSIYASI
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCKcBoog9nxEZRTq81igQ1ATsfFTX6dgK0",
  authDomain: "session-ccf23.firebaseapp.com",
  databaseURL: "https://session-ccf23-default-rtdb.firebaseio.com",
  projectId: "session-ccf23",
  storageBucket: "session-ccf23.firebasestorage.app",
  messagingSenderId: "84823899866",
  appId: "1:84823899866:web:6fb0755ccc8ab47bfd6fe3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ═══════════════════════════════════════════════════════
// 2. GLOBAL O'ZGARUVCHILAR (SIZNING KODDAGI)
// ═══════════════════════════════════════════════════════
let currentUser = null;
let questions = [], shuffled = [];
let currentIdx = 0, correctCount = 0, wrongCount = 0, answeredCount = 0;
let answered = false, totalTime = 0, startTime = null, wrongQuestions = [];
let pendingQuestions = null;
const COLORS = ['red','blue','yellow','green'];

// Parolni hash qilish (Sizniki kabi)
function hashPass(p) {
  let h = 5381;
  for (let i = 0; i < p.length; i++) { h = ((h << 5) + h) ^ p.charCodeAt(i); h = h >>> 0; }
  return h.toString(16).padStart(8,'0') + p.length.toString(16);
}

// ═══════════════════════════════════════════════════════
// 3. AUTH MANTIQI (FIREBASE BILAN)
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tab-login').style.display = tab==='login' ? '' : 'none';
  document.getElementById('tab-register').style.display = tab==='register' ? '' : 'none';
  document.getElementById('btn-login-tab').classList.toggle('active', tab==='login');
  document.getElementById('btn-reg-tab').classList.toggle('active', tab==='register');
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if(!u || !p) return alert("To'ldiring!");

  const snap = await db.ref('users/' + u).once('value');
  const user = snap.val();
  if(user && user.hash === hashPass(p)) loginOk(u);
  else alert("Username yoki parol xato!");
}

async function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  const p2 = document.getElementById('reg-pass2').value;
  if(u.length < 3 || p !== p2) return alert("Xatolik!");

  await db.ref('users/' + u).set({ hash: hashPass(p), created: Date.now() });
  loginOk(u);
}

function loginOk(username) {
  currentUser = { username };
  localStorage.setItem('qm_current', username);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('user-name-display').textContent = username;
  document.getElementById('user-avatar').textContent = username[0].toUpperCase();
  renderSavedTests();
}

function doLogout() {
  localStorage.removeItem('qm_current');
  location.reload();
}

// ═══════════════════════════════════════════════════════
// 4. EXCEL VA IDX MANTIQI (SIZNING ASL KODINGIZ)
// ═══════════════════════════════════════════════════════
function handleFile(inp) {
  const file = inp.files[0];
  const r = new FileReader();
  r.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'binary'});
    parseWorkbook(wb);
  };
  r.readAsBinaryString(file);
}

function parseWorkbook(wb) {
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(sheet, {header:1});
  if(data.length < 2) return alert("Excel bo'sh!");

  let idxQ=-1, idxA=-1, idxB=-1, idxC=-1, idxD=-1, idxCor=-1;
  const head = data[0];
  for(let i=0; i<head.length; i++) {
    let h = String(head[i]).toLowerCase();
    if(h.includes('savol')) idxQ=i;
    else if(h==='a') idxA=i; else if(h==='b') idxB=i;
    else if(h==='c') idxC=i; else if(h==='d') idxD=i;
    else if(h.includes('javob')) idxCor=i;
  }

  if(idxQ===-1 || idxCor===-1) return alert("Sutunlar topilmadi (Savol, A, B, C, D, Javob)!");

  const raw = [];
  for(let i=1; i<data.length; i++) {
    const r = data[i];
    if(!r[idxQ]) continue;
    raw.push({
      text: r[idxQ],
      options: [
        {text: r[idxA], letter:'A', isCorrect: String(r[idxCor]).trim()==='A'},
        {text: r[idxB], letter:'B', isCorrect: String(r[idxCor]).trim()==='B'},
        {text: r[idxC], letter:'C', isCorrect: String(r[idxCor]).trim()==='C'},
        {text: r[idxD], letter:'D', isCorrect: String(r[idxCor]).trim()==='D'}
      ],
      correctLetter: String(r[idxCor]).trim()
    });
  }
  pendingQuestions = raw;
  document.getElementById('name-modal').classList.add('show');
}

async function confirmSaveAndStart() {
  const name = document.getElementById('test-name-input').value || "Yangi Test";
  const id = Date.now();
  const testObj = { id, name, questions: pendingQuestions, count: pendingQuestions.length, date: new Date().toLocaleDateString() };
  
  await db.ref('tests/' + currentUser.username + '/' + id).set(testObj);
  questions = pendingQuestions;
  document.getElementById('name-modal').classList.remove('show');
  startQuiz();
}

function cancelModal() { document.getElementById('name-modal').classList.remove('show'); }

async function renderSavedTests() {
  const snap = await db.ref('tests/' + currentUser.username).once('value');
  const tests = snap.val() || {};
  const list = Object.values(tests);
  document.getElementById('tests-count').textContent = list.length;
  const listEl = document.getElementById('saved-tests-list');
  
  if(list.length === 0) {
    listEl.innerHTML = '<div class="no-tests-msg">Testlar yo\'q</div>';
    return;
  }
  listEl.innerHTML = list.map(t => `
    <div class="saved-test-card">
      <div><div class="st-name">${t.name}</div><div class="st-meta">${t.count} ta savol</div></div>
      <div class="st-actions">
        <button class="st-start-btn" onclick='loadSavedTest(${t.id})'>Boshlash</button>
        <button class="st-del-btn" onclick="deleteSavedTest(${t.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

async function loadSavedTest(id) {
  const snap = await db.ref('tests/' + currentUser.username + '/' + id).once('value');
  questions = snap.val().questions;
  startQuiz();
}

async function deleteSavedTest(id) {
  if(confirm("O'chirilsinmi?")) {
    await db.ref('tests/' + currentUser.username + '/' + id).remove();
    renderSavedTests();
  }
}
// ═══════════════════════════════════════════════════════
// 5. QUIZ JARAYONI (SIZNING ASL MANTIQINGIZ)
// ═══════════════════════════════════════════════════════
function startQuiz() {
  if (!questions || questions.length === 0) return alert("Savollar yuklanmagan!");
  
  // Savollarni aralashtirish (Sizniki kabi)
  shuffled = [...questions].sort(() => Math.random() - 0.5);
  shuffled.forEach(q => {
    q.options = [...q.options].sort(() => Math.random() - 0.5);
  });

  currentIdx = 0; correctCount = 0; wrongCount = 0; answeredCount = 0;
  totalTime = 0; wrongQuestions = [];
  startTime = Date.now();

  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = shuffled[currentIdx];
  
  // Progress bar va Statistika
  const pct = Math.round((currentIdx / shuffled.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-number').textContent = `SAVOL ${currentIdx + 1} / ${shuffled.length}`;
  document.getElementById('question-text').textContent = q.text;
  
  // Statistika chiplarini yangilash
  document.getElementById('stats-inner').innerHTML = `
    <div class="stat-chip">Jami: ${shuffled.length}</div>
    <div class="stat-chip" style="color:var(--green)">To'g'ri: ${correctCount}</div>
    <div class="stat-chip" style="color:var(--accent)">Xato: ${wrongCount}</div>
  `;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="opt-label" style="background:var(--opt-${COLORS[i]})">${opt.letter || String.fromCharCode(65+i)}</div> <span>${opt.text}</span>`;
    btn.onclick = () => checkAnswer(opt, btn);
    grid.appendChild(btn);
  });
}

function checkAnswer(opt, btn) {
  if (answered) return;
  answered = true;
  answeredCount++;

  const q = shuffled[currentIdx];
  const allBtns = document.querySelectorAll('.option-btn');
  
  if (opt.isCorrect) {
    btn.classList.add('correct-ans');
    correctCount++;
  } else {
    btn.classList.add('wrong-ans');
    wrongCount++;
    wrongQuestions.push({ q: q.text, your: opt.text, correct: q.options.find(o => o.isCorrect).text });
    // To'g'ri javobni ko'rsatish
    allBtns.forEach(b => {
      const bText = b.querySelector('span').textContent;
      if (bText === q.options.find(o => o.isCorrect).text) b.classList.add('correct-ans');
    });
  }

  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < shuffled.length) {
    showQuestion();
  } else {
    finishQuiz();
  }
}

// ═══════════════════════════════════════════════════════
// 6. NATIJALARNI KO'RSATISH (SIZNING ASL DIZAYNINGIZ)
// ═══════════════════════════════════════════════════════
function finishQuiz() {
  totalTime = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'flex';

  const scorePct = Math.round((correctCount / shuffled.length) * 100);
  document.getElementById('result-score-big').textContent = scorePct + '%';

  document.getElementById('result-cards-box').innerHTML = `
    <div class="result-card"><h3>${correctCount}</h3><p>To'g'ri</p></div>
    <div class="result-card"><h3>${wrongCount}</h3><p>Xato</p></div>
    <div class="result-card"><h3>${totalTime}s</h3><p>Vaqt</p></div>
    <div class="result-card"><h3>${shuffled.length}</h3><p>Jami</p></div>
  `;

  // Xatolarni ko'rib chiqish (Review)
  const rev = document.getElementById('review-section');
  if (wrongQuestions.length === 0) {
    rev.innerHTML = '<div style="color:var(--green); text-align:center; padding:20px;">Ajoyib! Hech qanday xato qilmadingiz!</div>';
  } else {
    let html = '<h3 style="margin-bottom:15px; color:var(--accent)">Xatolar tahlili:</h3>';
    wrongQuestions.forEach((w, i) => {
      html += `
        <div class="question-card" style="margin-bottom:10px; border-left:4px solid var(--accent)">
          <p><b>${i+1}. ${w.q}</b></p>
          <p style="color:var(--accent); font-size:0.9rem">Sizning javob: ${w.your}</p>
          <p style="color:var(--green); font-size:0.9rem">To'g'ri javob: ${w.correct}</p>
        </div>`;
    });
    rev.innerHTML = html;
  }
}

function backToUpload() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  renderSavedTests();
}

// Avtomatik kirishni tekshirish
window.onload = () => {
  const saved = localStorage.getItem('qm_current');
  if(saved) loginOk(saved);
  else document.getElementById('upload-screen').style.display = 'none';
};
