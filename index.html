<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 QuizMaster Pro Cloud</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.18.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap');
:root{
  --bg:#0d0d1a;--surface:#1a1a2e;--card:#16213e;
  --accent:#e94560;--gold:#f5a623;--green:#00d4aa;
  --blue:#4a90d9;--text:#f0f0f0;--muted:#8892a4;
  --radius:16px;--shadow:0 8px 32px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;outline:none;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* Layout */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:20px;width:100%;}
.show{display:flex !important;}
.container{width:100%;max-width:550px;margin:auto;}
.card{background:var(--surface);padding:25px;border-radius:var(--radius);box-shadow:var(--shadow);width:100%;margin-bottom:20px;}

/* Elements */
h1{font-family:'Righteous',cursive;font-size:2.8rem;color:var(--accent);text-align:center;margin-bottom:10px;}
input{width:100%;padding:14px;background:var(--card);border:2px solid transparent;border-radius:12px;color:#fff;margin-bottom:15px;transition:0.3s;}
input:focus{border-color:var(--accent);}
button{cursor:pointer;border:none;border-radius:12px;font-weight:700;transition:0.3s;font-size:1rem;}
.primary-btn{width:100%;padding:15px;background:var(--accent);color:#fff;box-shadow:0 4px 15px rgba(233,69,96,0.3);}
.primary-btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.secondary-btn{background:transparent;color:var(--muted);width:100%;padding:10px;}

/* Quiz Design */
.option-btn{width:100%;text-align:left;padding:15px;margin-bottom:12px;background:var(--card);border-radius:12px;color:#fff;border:1px solid rgba(255,255,255,0.05);}
.option-btn:hover{background:var(--accent);color:#fff;}
.progress-bar{width:100%;height:8px;background:#333;border-radius:4px;margin-bottom:20px;overflow:hidden;}
#progress-fill{height:100%;background:var(--accent);width:0%;transition:0.3s;}

/* Result Review */
.review-item{background:var(--card);padding:15px;border-radius:12px;margin-bottom:15px;border-left:5px solid #444;}
.review-item.correct{border-color:var(--green);}
.review-item.wrong{border-color:var(--accent);}
.ans-label{display:block;font-size:0.85rem;margin-top:5px;}

/* Modals */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(5px);}
.modal.show{display:flex;}
</style>
</head>
<body>

<div id="login-screen" class="screen show">
  <div class="container">
    <h1>QuizMaster</h1>
    <div class="card">
      <input type="text" id="login-user" placeholder="Username">
      <input type="password" id="login-pass" placeholder="Parol">
      <button class="primary-btn" onclick="doLogin()">Kirish</button>
      <button class="secondary-btn" onclick="switchScreen('reg-screen')">Ro'yxatdan o'tish</button>
    </div>
  </div>
</div>

<div id="reg-screen" class="screen">
  <div class="container">
    <h1>Yangi Hisob</h1>
    <div class="card">
      <input type="text" id="reg-user" placeholder="Username">
      <input type="password" id="reg-pass" placeholder="Parol">
      <input type="password" id="reg-pass2" placeholder="Parolni tasdiqlang">
      <button class="primary-btn" onclick="doRegister()">Yaratish</button>
      <button class="secondary-btn" onclick="switchScreen('login-screen')">Orqaga</button>
    </div>
  </div>
</div>

<div id="upload-screen" class="screen">
  <div class="container">
    <div style="display:flex;justify-content:space-between;padding:10px">
      <span id="user-info" style="color:var(--gold);font-weight:800"></span>
      <button onclick="doLogout()" style="background:none;color:var(--accent)">Chiqish</button>
    </div>
    <div class="card" style="border:2px dashed #444;text-align:center">
      <p>Excel (.xlsx) yuklang</p><br>
      <input type="file" id="file-input" style="display:none" onchange="handleFile(event)">
      <button class="primary-btn" style="background:var(--blue)" onclick="document.getElementById('file-input').click()">📁 Fayl tanlash</button>
    </div>
    <h3>Mening Testlarim (<span id="tests-cnt">0</span>)</h3><br>
    <div id="saved-tests-list"></div>
  </div>
</div>

<div id="quiz-screen" class="screen">
  <div class="container">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="q-info" style="margin-bottom:10px;color:var(--muted)"></div>
    <div class="card">
      <h2 id="q-text" style="margin-bottom:20px"></h2>
      <div id="options-box"></div>
    </div>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="container">
    <h1>Natija</h1>
    <div class="card" style="text-align:center">
      <div id="score-circle" style="font-size:4rem;font-weight:900;color:var(--green)">0%</div>
      <p id="stats-detail" style="color:var(--muted);margin:15px 0"></p>
      <button class="primary-btn" onclick="switchScreen('upload-screen')">Asosiy menyu</button>
    </div>
    <h3>Xatolar ustida ishlash:</h3><br>
    <div id="review-box"></div>
  </div>
</div>

<div id="name-modal" class="modal">
  <div class="card" style="max-width:400px">
    <h3>Testga nom bering</h3><br>
    <input type="text" id="test-name" placeholder="Masalan: Tarix 1-mavzu">
    <button class="primary-btn" onclick="saveNewTest()">Saqlash</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCKcBoog9nxEZRTq81igQ1ATsfFTX6dgK0",
  authDomain: "session-ccf23.firebaseapp.com",
  databaseURL: "https://session-ccf23-default-rtdb.firebaseio.com",
  projectId: "session-ccf23",
  storageBucket: "session-ccf23.firebasestorage.app",
  messagingSenderId: "84823899866",
  appId: "1:84823899866:web:6fb0755ccc8ab47bfd6fe3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null, questions = [], pending = [], currentIdx = 0, userAns = [], startTime;

// --- AUTH ---
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const s = await db.ref('users/'+u).once('value');
  if(s.exists() && s.val().h === btoa(p)) loginOk(u);
  else alert('Xato!');
}
async function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  if(u.length<3 || p!==document.getElementById('reg-pass2').value) return alert('Xato!');
  await db.ref('users/'+u).set({h: btoa(p)});
  loginOk(u);
}
function loginOk(u) {
  currentUser = u; localStorage.setItem('qm_user', u);
  document.getElementById('user-info').innerText = '👤 '+u;
  switchScreen('upload-screen'); renderSavedTests();
}
function doLogout() { localStorage.clear(); location.reload(); }

// --- CORE ---
async function renderSavedTests() {
  const s = await db.ref('tests/'+currentUser).once('value');
  const tests = s.val() ? Object.values(s.val()) : [];
  document.getElementById('tests-cnt').innerText = tests.length;
  document.getElementById('saved-tests-list').innerHTML = tests.map(t => `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:15px">
      <div><b>${t.n}</b><br><small>${t.c} savol • ${t.d}</small></div>
      <div>
        <button onclick='startQuiz(${JSON.stringify(t.q).replace(/'/g,"&apos;")})' style="background:var(--green);padding:10px">▶</button>
        <button onclick="deleteTest('${t.id}')" style="background:#444;padding:10px">🗑</button>
      </div>
    </div>
  `).join('');
}

function handleFile(e) {
  const reader = new FileReader();
  reader.onload = (evt) => {
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    pending = json.map(r => ({
      q: r.Savol||r.savol, a:r.A, b:r.B, c:r.C, d:r.D, 
      cor: (r.Javob||r.javob||'').toString().toLowerCase()
    })).filter(x => x.q);
    if(pending.length) document.getElementById('name-modal').classList.add('show');
  };
  reader.readAsArrayBuffer(e.target.files[0]);
}

async function saveNewTest() {
  const id = 't_'+Date.now();
  await db.ref('tests/'+currentUser+'/'+id).set({
    id, n: document.getElementById('test-name').value||'Test',
    q: pending, c: pending.length, d: new Date().toLocaleDateString()
  });
  document.getElementById('name-modal').classList.remove('show');
  renderSavedTests();
}

async function deleteTest(id) {
  if(confirm('Ochirish?')) { await db.ref('tests/'+currentUser+'/'+id).remove(); renderSavedTests(); }
}

function startQuiz(qs) {
  questions = qs; currentIdx = 0; userAns = []; startTime = Date.now();
  switchScreen('quiz-screen'); showQ();
}

function showQ() {
  const q = questions[currentIdx];
  document.getElementById('q-info').innerText = `Savol ${currentIdx+1}/${questions.length}`;
  document.getElementById('progress-fill').style.width = (currentIdx/questions.length)*100+'%';
  document.getElementById('q-text').innerText = q.q;
  const box = document.getElementById('options-box');
  box.innerHTML = '';
  ['a','b','c','d'].forEach(k => {
    if(q[k]) {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = k.toUpperCase()+') '+q[k];
      btn.onclick = () => { userAns.push(k); currentIdx++; if(currentIdx<questions.length) showQ(); else finish(); };
      box.appendChild(btn);
    }
  });
}

function finish() {
  let cor = 0;
  let html = '';
  userAns.forEach((a, i) => {
    const isCor = a === questions[i].cor;
    if(isCor) cor++;
    html += `<div class="review-item ${isCor?'correct':'wrong'}">
      <b>${i+1}. ${questions[i].q}</b>
      <span class="ans-label">Siz: ${a.toUpperCase()} | To'g'ri: ${questions[i].cor.toUpperCase()}</span>
    </div>`;
  });
  const p = Math.round((cor/questions.length)*100);
  document.getElementById('score-circle').innerText = p+'%';
  document.getElementById('stats-detail').innerText = `${questions.length} tadan ${cor} ta to'g'ri.`;
  document.getElementById('review-box').innerHTML = html;
  switchScreen('result-screen');
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}

window.onload = () => { if(localStorage.getItem('qm_user')) loginOk(localStorage.getItem('qm_user')); };
</script>
</body>
</html>
